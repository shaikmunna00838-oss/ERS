<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body>

<h2>Technical Quiz</h2>

<h3>Time Left: <span id="timer">15:00</span></h3>

<form method="POST">
    {% for q in questions %}
        <p><b>{{ loop.index }}. {{ q[2] }}</b></p>
        <input type="radio" name="{{ q[0] }}" value="{{ q[3] }}" required> {{ q[3] }}<br>
        <input type="radio" name="{{ q[0] }}" value="{{ q[4] }}"> {{ q[4] }}<br>
        <input type="radio" name="{{ q[0] }}" value="{{ q[5] }}"> {{ q[5] }}<br>
        <input type="radio" name="{{ q[0] }}" value="{{ q[6] }}"> {{ q[6] }}<br><br>
    {% endfor %}

    <button type="submit">Submit Quiz</button>
</form>

<script>
let time = 900;
let countdown = setInterval(function() {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("timer").innerText =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

    time--;

    if (time < 0) {
        clearInterval(countdown);
        alert("Time is up!");
        document.forms[0].submit();
    }
}, 1000);
</script>

</body>
</html>
